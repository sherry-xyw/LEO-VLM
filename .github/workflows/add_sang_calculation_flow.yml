name: Add Sang calculation methodology section

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/add_sang_calculation_flow.yml

permissions:
  contents: write

jobs:
  update-document:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Insert methodology section
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path('环境-算力/星上算力环境调研.md')
          text = p.read_text(encoding='utf-8')
          marker = '## 8. 核心来源'
          if '## 8. Sang 的资源匹配计算流程及可复用写作模板' in text:
              raise SystemExit('Section already exists; no change made.')

          section = r'''## 8. Sang 的资源匹配计算流程及可复用写作模板

本节不再重复平台参数或案例结论，而是抽取 Sang 综述在“500M 参数遥感基础模型—6U CubeSat—候选边缘硬件”案例中使用的资源匹配计算流程。该流程适合作为本文后续撰写“模型—平台—任务”部署分析时的基本模板；但面向 VLM 时，需要把视觉 token、语言模型和 KV cache 等额外负载纳入预算。

### 8.1 Sang 的计算逻辑：从模型需求到部署结论

Sang 的判断不是直接比较“模型参数量”和“芯片 TOPS”，而是采用如下链条：

> **任务与模型抽象 → 计算量估算 → 内存需求估算 → 卫星资源预算 → 候选硬件筛选 → 部署可行性结论。**

| 步骤 | Sang 使用的输入 | 计算或判断 | 回答的问题 |
| --- | --- | --- | --- |
| 1. 定义代表性模型 | 约 500M 参数遥感基础模型；ViT 类视觉编码器 | 将模型规模、输入分辨率与 patch/token 机制作为资源需求起点 | 要部署的对象有多大？ |
| 2. 估算视觉计算量 | 输入尺寸 `H×W`、patch `P`、隐层维度 `D` | `N=H×W/P²`；主要计算项约为 `2ND²+4N²D` | 高分辨率输入会带来多少 token 与计算压力？ |
| 3. 估算静态内存 | 500M 参数、FP16/INT8 精度 | FP16 权重约 1 GB，INT8 权重约 500 MB；据此给出 `>2 GB DRAM` 的最低建议 | 模型至少能否装入目标平台？ |
| 4. 定义卫星资源包络 | 6U 质量、轨道周期、阴影期、太阳翼 OAP、平台基础负载 | 从 18.5 W OAP 与 7.8 W 平台负载出发，得到 AI 功率不超过约 10 W 的示例约束 | 整星能够给 AI 提供多少持续资源？ |
| 5. 筛选候选硬件 | TOPS、内存、模组功耗、空间资格/辐照信息 | 比较 Myriad、Coral、Jetson、FPGA/AI Engine 等平台能否同时满足内存、吞吐和功耗约束 | 哪些硬件存在理论部署窗口？ |
| 6. 给出分层结论 | 卫星等级、模型规模、候选硬件 | 将皮卫星、6U 纳卫星和大型卫星对应到轻量模型、约 500M 模型和十亿参数级模型 | 在什么平台上可讨论什么量级的模型？ |
| 7. 保留证据边界 | 在轨案例与资源估算 | 区分“轻量 AI 已飞行验证”与“中型 RSFM 的资源理论可行性” | 结论是实验事实还是工程推断？ |

这个链条的关键价值在于，它把“算力环境”从硬件参数罗列转化为一个可回答部署问题的因果过程：**模型需求必须与整星资源包络在同一任务窗口内匹配。**

### 8.2 可复用的计算骨架

对于任意给定的任务、模型和平台，建议按下列顺序进行计算与写作。

#### 8.2.1 任务与模型侧：计算、内存和时延需求

1. **定义任务输入与输出**：图像/高光谱/多时相数据的分辨率、波段数、时间窗口、输出类型，以及是否需要生成式文本响应。
2. **计算视觉 token 数**：

   `N = H × W / P²`

3. **估算视觉编码器的主要计算项**：

   `C_visual ≈ 2ND² + 4N²D`

   若使用窗口注意力、token 合并或分块推理，应给出压缩前后的 `N` 和 `C_visual`。

4. **计算静态权重内存**：

   `M_weight = 参数量 × 每参数字节数`

5. **估算峰值运行内存**：

   `M_peak = M_weight + M_activation + M_KV + M_input/output + M_workspace + M_runtime + M_OS + M_margin`

其中，`M_KV` 对生成式 VLM 尤其重要；`M_margin` 应覆盖内存碎片、双缓冲、容错副本和运行波动。

6. **给出任务级时延目标**：例如从成像完成到告警、筛选结果或文本报告输出的最大允许时延，而不是只报告单次前向计算量。

#### 8.2.2 平台侧：功率、能量、热控与可靠性资源

1. **定义整星可用功率，而非芯片 TDP**：

   `P_AI,available = P_orbit - P_bus - P_payload,other - P_margin`

2. **定义任务窗口内的能量预算**：

   `E_AI,window = ∫ P_AI,available(t) dt`

   对简化估算，可按日照期、阴影期和电池效率分段计算。

3. **定义持续运行约束**：包括热稳态功率、降频后的吞吐、散热器能力与推理占空比；峰值 TOPS 不能替代这些量。

4. **定义可靠性资源**：包括 ECC/EDAC、看门狗、重启时间、检查点、模型哈希校验、备用模型以及辐射事件后的恢复策略。

#### 8.2.3 匹配与决策侧：形成可解释的部署结论

建议使用四个判断门槛：

| 判断门槛 | 最低问题 | 典型失败原因 | 可对应的优化方向 |
| --- | --- | --- | --- |
| 算得动吗？ | 任务窗口内能否完成编码、推理和输出？ | 视觉 token 过多、注意力计算过大、算子不适配 | token 压缩、分块/流式、稀疏、编译优化、早退 |
| 装得下吗？ | 峰值内存是否低于可用 DRAM？ | 权重、激活、KV cache 和输入缓存叠加 | 量化、蒸馏、KV 压缩、分页与分层加载 |
| 供得起吗？ | 能量与热稳态是否支持所需占空比？ | 单轨能量不足、热降频、通信与推理争抢资源 | 动态分辨率、任务调度、突发推理、能量感知路由 |
| 撑得住吗？ | 辐射和中断下能否保持任务连续性？ | SEU/TID、链路中断、软件失效、模型损坏 | ECC、检查点、冗余、回退模型、A/B 版本与自动恢复 |

最终结论不宜只写“可部署”或“不可部署”，而应采用分级表述：

- **已在轨验证**：任务、平台和运行结果均有公开证据；
- **资源上可行**：在明确输入、精度、占空比和模型压缩假设下满足预算，但缺乏在轨验证；
- **需系统级验证**：权重可加载或峰值 TOPS 足够，但内存、热控、可靠性或任务时延尚未闭合；
- **当前不宜部署**：至少一项核心约束在目标平台上明显不满足。

### 8.3 对 VLM 研究的改写与增强方向

Sang 的示例以视觉基础模型为主，适合提供第一层资源估算；面向 VLM，本文应在其框架上增加以下内容：

1. **从单一视觉编码器扩展为完整 VLM 栈**：分别核算视觉编码器、跨模态投影层、语言模型、任务头和外部检索模块的权重与运行开销。
2. **从单幅图像扩展到视觉 token 与 KV cache 联合峰值**：高分辨率图像、图像块、多时相上下文和生成长度会共同决定内存上限。
3. **从静态 TOPS 比较扩展到 prefill/decode 分离分析**：VLM 的视觉预填充与文本解码在计算、内存带宽和时延上具有不同特征。
4. **从单次推理扩展到任务闭环**：应将成像、预处理、推理、下传/星间转发、告警和回滚纳入同一时间与能量窗口。
5. **从“资源可行”扩展到“飞行可持续”**：除内存和功率外，还要报告热稳态吞吐、辐射错误率、恢复时间、单位任务能耗及任务可用率。

### 8.4 可直接复用的综述写作段落模板

后续针对某一类模型、平台或任务撰写时，可采用如下固定结构：

> **第一步：定义场景。** 说明任务输入、时效目标、卫星类型、轨道与载荷边界。  
> **第二步：估算模型需求。** 从参数量、精度、视觉 token、激活、KV cache 和端到端时延量化资源需求。  
> **第三步：定义平台资源。** 报告可用 DRAM、整星功率/能量、热稳态吞吐、存储、辐射缓解与任务占空比。  
> **第四步：进行供需匹配。** 依次判断算得动、装得下、供得起和撑得住，并明确每项判断使用的假设。  
> **第五步：给出分级结论。** 区分已飞行验证、资源上可行、仍需系统验证和当前不宜部署。  
> **第六步：导出技术选择。** 将未闭合的约束映射到量化、token 压缩、KV cache 管理、流式推理、早退、硬件感知编译、容错或星座协同等方法。

这种写法既保留 Sang 的“模型—资源—硬件”分析优点，也避免把单一参数规模、芯片峰值 TOPS 或一次性地面测试误写成在轨部署结论。

'''

          pos = text.index(marker)
          text = text[:pos] + section + text[pos:]
          text = text.replace('## 8. 核心来源', '## 9. 核心来源', 1)
          p.write_text(text, encoding='utf-8')
          PY
      - name: Commit result and remove temporary workflow
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/add_sang_calculation_flow.yml
          git add '环境-算力/星上算力环境调研.md'
          git commit -m 'docs: add Sang calculation methodology section'
          git push
